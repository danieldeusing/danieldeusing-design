name: release

# Publishes to npm on every push to main — but only when package.json's version is not
# already on the registry (npm cannot republish a version). Bump the version in
# package.json to cut a release; this workflow then publishes via npm Trusted Publishing
# (OIDC — no token), tags vX.Y.Z, and creates a matching GitHub release (the immutable
# ref jsDelivr serves).
#
# One-time setup (Trusted Publishing has a chicken-and-egg for brand-new packages — the
# trusted publisher is configured on the PACKAGE, which must exist first):
#   1. Publish 0.1.0 once manually to claim the name:  npm publish --access public
#   2. On npmjs.com → the package → Settings → Trusted Publisher → GitHub Actions, set:
#        Organization or user = danieldeusing
#        Repository           = danieldeusing-design
#        Workflow filename    = release.yml
#        Allowed actions      = npm publish
#   After that, every version bump publishes from CI with no stored token.

on:
  push:
    branches: [main]

permissions:
  contents: write # push the version tag + create the release
  id-token: write # OIDC token for npm Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # Trusted Publishing needs Node >= 22.14.0
          registry-url: https://registry.npmjs.org

      # Trusted Publishing needs npm CLI >= 11.5.1; Node 22 ships an older npm.
      - name: Upgrade npm to a Trusted-Publishing-capable version
        run: npm install -g npm@latest

      - name: Resolve version
        id: meta
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Skip if version already published
        id: decide
        run: |
          if npm view "danieldeusing-design@${{ steps.meta.outputs.version }}" version >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "v${{ steps.meta.outputs.version }} is already on npm — nothing to do."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build dist + tokens
        if: steps.decide.outputs.publish == 'true'
        run: node scripts/build.mjs

      - name: Verify committed artifacts are up to date
        if: steps.decide.outputs.publish == 'true'
        run: git diff --exit-code dist tokens/tokens.json

      # No NODE_AUTH_TOKEN and no --provenance: Trusted Publishing authenticates via OIDC
      # and generates provenance automatically.
      - name: Publish to npm (Trusted Publishing)
        if: steps.decide.outputs.publish == 'true'
        run: npm publish --access public

      - name: Tag and create GitHub release (idempotent)
        if: steps.decide.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.meta.outputs.version }}"
          if ! git rev-parse "$tag" >/dev/null 2>&1; then
            git tag "$tag"
            git push origin "$tag"
          fi
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --notes "See CHANGELOG.md for details."
          fi
